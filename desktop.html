<!DOCTYPE html>
<html>
<head>
  <title>IodineOS Alpha 0.05</title>
  <link rel="icon" href="icon/x-icon.png" type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    .window {
      position: absolute;
      z-index: 1;
      background-color: #fff;
      border: 1px solid #000;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      width: 300px;
    }

    .window--maximized {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: none;
    }

    .window-content {
      padding: 10px;
      height: calc(100% - 30px); 
    }

    .window-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .window-resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
    }

    .window-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
            body {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <p><b>IodineOS</b> Alpha v0.04</p>
  <i>NOTE: Some apps don't work yet.</i>
  <div class="p-1 fixed bottom-0 left-0 w-full bg-gray-300 flex taskbar">
        <button onclick="update()">Refresh</button>
        <button onclick='window.location.href = "anti-index.html"'>Reboot</button>

    <button class="p-2" onclick="openWindow('apps/about.html', 'About')">About</button>
    <button class="p-2" onclick="openWindow('https://random.dog', 'dawg')">dawg</button>
    <button class="p-2" onclick="openWindow('apps/Border/index.html', 'Border')">Border</button>
    <button class="p-2" onclick="openWindow('apps/notes.html', 'Notes')">Notes</button>
    <button class="p-2" onclick="openWindow('https://www.windows96.net', 'Windows 96')">Windows 96</button>
    <button class="p-2" onclick="openWindow('https://www.windows93.net', 'WINDOWS93')">Windows 93</button>
    <button class="p-2" onclick="openWindow('https://windows85.neocities.org', 'Windows 85')">Windows 85</button>
    <button class="p-2" onclick="openWindow('apps/files.html', 'Files')">Files</button>
    <button class="p-2" onclick="openWindow('apps/ver.html', 'Version')">Version</button>
    <button class="p-2" onclick="openWindow('apps/discordwidget.old.html', 'XenonOS Server Widget')">(OLD!) Discord Widget</button>
    <button class="p-2" onclick="openWindow('apps/discordwidget.html', 'Treehouse of Zirconium Widget')"> Discord Widget</button>
    <button class="p-2" onclick="openWindow('apps/webgl.html', 'WebGL Test')">WebGL Test</button>
    <button class="p-2" onclick="openWindow('https://www.weather.com', 'Weather')">Weather</button>
    <button class="p-2" onclick="openWindow('apps/useragent.html', 'User Agent')">User Agent Shower</button>
    <button class="p-2" onclick="openWindow('https://miki1513.github.io/GamesOS', 'GamesOS')">GamesOS</button>
	<p>Other <b>OS</b>es</p>
    <button class="p-2" onclick="openWindow('https://melonos6.neocities.org', 'GWindows WLX+ 6.8')">Original version of IodineOS</button>
	<p><b>License</b>s for things</p>
    <button class="p-2" onclick="openWindow('ccbysa.html', 'Creative Commmons BY-SA 4.0 International')">Website License</button>
    <button class="p-2" onclick="openWindow('silof.html', 'SIL Open Font 1.1')">Font License for Exo 2</button>
	<button class="p-2" onclick="openWindow('apps/Border/mit.html', 'MIT')">Border License</button>
    </div>

  <script>
    function openWindow(url, title) {
      const windowElement = document.createElement('div');
      windowElement.classList.add('window');
      windowElement.style.top = '50px';
      windowElement.style.left = '50px';
      document.body.appendChild(windowElement);

      const titleBar = document.createElement('div');
      titleBar.classList.add('title-bar');
      windowElement.appendChild(titleBar);

      const titleText = document.createElement('div');
      titleText.classList.add('title-bar-text');
      titleText.textContent = title;
      titleBar.appendChild(titleText);

      const titleBarControls = document.createElement('div');
      titleBarControls.classList.add('title-bar-controls');
      titleBar.appendChild(titleBarControls);

      const minimizeButton = document.createElement('button');
      minimizeButton.setAttribute('aria-label', 'Minimize');
      minimizeButton.addEventListener('click', () => {
        windowElement.style.display = 'none';
      });
      titleBarControls.appendChild(minimizeButton);

      const maximizeButton = document.createElement('button');
      maximizeButton.setAttribute('aria-label', 'Maximize');
      maximizeButton.addEventListener('click', () => {
        if (windowElement.classList.contains('window--maximized')) {
          windowElement.classList.remove('window--maximized');
          const iframe = windowElement.querySelector('iframe');
          iframe.style.height = windowElement.offsetHeight - 30 + 'px'; 
        } else {
          windowElement.classList.add('window--maximized');
          const iframe = windowElement.querySelector('iframe');
          iframe.style.height = 'calc(100% - 30px)'; 
        }
      });
      titleBarControls.appendChild(maximizeButton);

      const closeButton = document.createElement('button');
      closeButton.setAttribute('aria-label', 'Close');
      closeButton.addEventListener('click', () => {
        windowElement.remove();
      });
      titleBarControls.appendChild(closeButton);

      const windowContent = document.createElement('div');
      windowContent.classList.add('window-content');
      windowElement.appendChild(windowContent);

      const iframe = document.createElement('iframe');
      iframe.src = url;
      windowContent.appendChild(iframe);

      const windowFooter = document.createElement('div');
      windowFooter.classList.add('window-footer');
      windowElement.appendChild(windowFooter);

      dragelement(windowElement);
      resizableelement(windowElement);
    }

    function dragelement(elmnt) {
      let pos1 = 0,
        pos2 = 0,
        pos3 = 0,
        pos4 = 0;
      elmnt.querySelector('.title-bar').onmousedown = dragmousedown;

      function dragmousedown(e) {
        e = e || window.event;
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closedragelement;
        document.onmousemove = elementdrag;
      }

      function elementdrag(e) {
        e = e || window.event;
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        elmnt.style.top = elmnt.offsetTop - pos2 + 'px';
        elmnt.style.left = elmnt.offsetLeft - pos1 + 'px';
      }

      function closedragelement() {
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }

    function resizableelement(elmnt) {
      const resizeHandle = document.createElement('div');
      resizeHandle.classList.add('window-resize-handle');
      elmnt.appendChild(resizeHandle);

      resizeHandle.addEventListener('mousedown', initresize, false);

      function initresize(e) {
        e.preventDefault();
        document.addEventListener('mousemove', resize, false);
        document.addEventListener('mouseup', stopresize, false);
      }

      function resize(e) {
        elmnt.style.width = e.clientX - elmnt.offsetLeft + 'px';
        elmnt.style.height = e.clientY - elmnt.offsetTop + 'px';
        const iframe = elmnt.querySelector('iframe');
        iframe.style.height = elmnt.offsetHeight - 30 + 'px';
      }

      function stopresize() {
        document.removeEventListener('mousemove', resize, false);
        document.removeEventListener('mouseup', stopResize, false);
      }
    }
  </script>
    <script>
        function update() {
            location.reload();
        }
    </script>
</body>
</html>
